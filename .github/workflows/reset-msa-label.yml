name: Reset MSA-checked label on PR update

on:
  pull_request:
    types: [synchronize]

jobs:
  reset-labels:
    # Only act on Renovate branches
    # Alternatively, filter by PR author:
    #   github.event.pull_request.user.login == 'renovate[bot]'
    if: startsWith(github.event.pull_request.head.ref, 'renovate/')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'MSA-checked'
              });
              core.info('Removed MSA-checked label — new commit pushed, review required again');
            } catch (error) {
              if (error.status === 404) {
                core.info('MSA-checked label not present, nothing to remove');
              } else {
                throw error;
              }
            }
